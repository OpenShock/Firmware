on:
  push:
    branches:
      - master
      - beta
      - develop
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
  pull_request:
    branches:
      - master
      - beta
      - develop
    types: [opened, reopened, synchronize]
  workflow_dispatch: # Manually invoked by user.

name: ci-build

env:
  PYTHON_VERSION: 3.13

jobs:
  getvars:
    uses: ./.github/workflows/get-vars.yml

  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            frontend

      - uses: ./.github/actions/build-frontend

  build-staticfs:
    runs-on: ubuntu-latest
    needs: [getvars, build-frontend]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-staticfs
        with:
          version: ${{ needs.getvars.outputs.version }}
          skip-checkout: true

  build-firmware:
    runs-on: ubuntu-latest
    needs: [getvars]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.getvars.outputs.board-matrix) }}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/build-firmware
        with:
          board: ${{ matrix.board }}
          version: ${{ needs.getvars.outputs.version }}
          skip-checkout: true

  merge-partitions:
    runs-on: ubuntu-latest
    needs: [getvars, build-staticfs, build-firmware]
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.getvars.outputs.board-matrix) }}

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            scripts
            boards
            chips

      - uses: ./.github/actions/merge-partitions
        with:
          version: ${{ needs.getvars.outputs.version }}
          board: ${{ matrix.board }}
          skip-checkout: true

  checkpoint-build:
    runs-on: ubuntu-latest
    needs: [merge-partitions]
    timeout-minutes: 1
    steps:
      - run: echo "Builds checkpoint reached"

  # Publish version metadata to the repository server (must exist before uploading board artifacts).
  repo-publish-version:
    runs-on: ubuntu-latest
    needs: [getvars, checkpoint-build]
    timeout-minutes: 5
    if: ${{ needs.getvars.outputs.should-deploy == 'true' }}
    environment: repo-server

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github

      - uses: ./.github/actions/repo-publish-version
        with:
          repo-server-url: ${{ vars.REPO_SERVER_URL }}
          repo-admin-token: ${{ secrets.REPO_ADMIN_TOKEN }}
          fw-version: ${{ needs.getvars.outputs.version }}
          release-channel: ${{ needs.getvars.outputs.release-channel }}
          commit-hash: ${{ github.sha }}
          release-url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.getvars.outputs.version }}

  # Upload firmware binaries per board to the repository server (which handles CDN upload).
  repo-upload-board:
    runs-on: ubuntu-latest
    needs: [getvars, repo-publish-version]
    timeout-minutes: 15
    environment: repo-server
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.getvars.outputs.board-matrix) }}

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github

      - uses: ./.github/actions/repo-upload-board
        with:
          repo-server-url: ${{ vars.REPO_SERVER_URL }}
          repo-admin-token: ${{ secrets.REPO_ADMIN_TOKEN }}
          fw-version: ${{ needs.getvars.outputs.version }}
          board: ${{ matrix.board }}

  checkpoint-deploy:
    runs-on: ubuntu-latest
    needs: [repo-upload-board]
    timeout-minutes: 1
    steps:
      - run: echo "Deploy checkpoint reached"

  release:
    runs-on: ubuntu-latest
    needs: [getvars, checkpoint-deploy]
    timeout-minutes: 1
    if: (needs.getvars.outputs.release-channel == 'stable' || needs.getvars.outputs.release-channel == 'beta')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8

      - name: Display artifacts
        run: ls -R

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: '**/OpenShock_*.bin'
          tag: ${{ needs.getvars.outputs.version }}
          prerelease: ${{ needs.getvars.outputs.release-channel != 'stable' }}
          artifactErrorsFailBuild: true
          body: ${{ needs.getvars.outputs.release-notes }}
